<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}MediVault{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/charts.js') }}" defer></script>
</head>
<body>
  <header>
    <strong>MediVault</strong>
    <nav style="margin-top:0.5rem;">
      <a href="/login" style="color:#b0bec5;">Login</a>
      &nbsp;|&nbsp;
      <a href="/dashboard" style="color:#b0bec5;">Dashboard</a>
      &nbsp;|&nbsp;
      <a href="/patient" style="color:#b0bec5;">Patient</a>
      &nbsp;|&nbsp;
      <a href="/doctor" style="color:#b0bec5;">Doctor</a>
      &nbsp;|&nbsp;
      <a href="/onboarding" style="color:#b0bec5;">Onboarding</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>MediVault — blockchain-anchored records</small>
  </footer>
  <script>
    window.__FIREBASE_CONFIG__ = {
      apiKey: "{{ config.FIREBASE_API_KEY }}",
      authDomain: "{{ config.FIREBASE_AUTH_DOMAIN }}",
      projectId: "{{ config.FIREBASE_PROJECT_ID }}",
      storageBucket: "{{ config.FIREBASE_STORAGE_BUCKET }}"
    };
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
